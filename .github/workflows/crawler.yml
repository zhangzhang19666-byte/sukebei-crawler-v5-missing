name: Sukebei Missing Crawler

on:
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: write
  actions: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    concurrency:
      group: crawler-loop
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install curl_cffi beautifulsoup4 lxml

      # ── 跑爬虫 ──
      - run: |
          python3 v5_nyaa_missing_crawler.py \
            --missing-dir=. \
            --workers=5 \
            --batch-size=1100 \
            --batch-timeout=900

      # ── 提交结果 ──
      - run: |
          git config user.email "bot@users.noreply.github.com"
          git config user.name "bot"
          git add -A
          git diff --staged --quiet || git commit -m "auto: crawl results"
          git push

      # ── 如果还有剩余ID，自触发 ──
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if python3 check_remaining.py 2>/dev/null | grep -q true; then
            echo "还有剩余ID，60秒后触发下一批..."
            sleep 60
            gh workflow run "Sukebei Missing Crawler" --ref master
          else
            echo "✅ 全部ID已消费完"
          fi
